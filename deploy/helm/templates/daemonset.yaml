apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: kube-nat-agent
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "kube-nat.labels" . | nindent 4 }}
    app: kube-nat
    component: agent
spec:
  selector:
    matchLabels:
      app: kube-nat
      component: agent
  template:
    metadata:
      labels:
        app: kube-nat
        component: agent
        {{- include "kube-nat.labels" . | nindent 8 }}
    spec:
      serviceAccountName: kube-nat-agent
      hostNetwork: true
      priorityClassName: system-node-critical
      terminationGracePeriodSeconds: 10
      nodeSelector:
        {{- toYaml .Values.agent.nodeSelector | nindent 8 }}
      tolerations:
      - operator: Exists
        effect: NoSchedule
      containers:
      - name: agent
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        args: ["agent"]
        securityContext:
          privileged: false
          capabilities:
            add: ["NET_ADMIN", "NET_RAW"]
          readOnlyRootFilesystem: true
        resources:
          {{- toYaml .Values.agent.resources | nindent 10 }}
        env:
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: POD_NAMESPACE
          value: {{ .Values.namespace | quote }}
        - name: KUBE_NAT_MODE
          value: {{ .Values.agent.mode | quote }}
        - name: KUBE_NAT_TAG_PREFIX
          value: {{ .Values.agent.tagPrefix | quote }}
        {{- if .Values.agent.conntrackMax }}
        - name: KUBE_NAT_CONNTRACK_MAX
          value: {{ .Values.agent.conntrackMax | quote }}
        {{- end }}
        {{- if .Values.agent.discovery }}
        - name: KUBE_NAT_DISCOVERY
          value: {{ .Values.agent.discovery | quote }}
        {{- end }}
        ports:
        - name: metrics
          containerPort: 9100
          protocol: TCP
        - name: peer
          containerPort: 9101
          protocol: TCP
        readinessProbe:
          httpGet:
            path: /readyz
            port: 9100
          initialDelaySeconds: 5
          periodSeconds: 5
        livenessProbe:
          httpGet:
            path: /healthz
            port: 9100
          initialDelaySeconds: 10
          periodSeconds: 10
        lifecycle:
          preStop:
            exec:
              command: ["/bin/sleep", "2"]
        volumeMounts:
        - name: proc
          mountPath: /host/proc
          readOnly: true
        - name: proc-sys
          mountPath: /host/proc/sys
        - name: lib-modules
          mountPath: /lib/modules
          readOnly: true
      volumes:
      - name: proc
        hostPath:
          path: /proc
      - name: proc-sys
        hostPath:
          path: /proc/sys
      - name: lib-modules
        hostPath:
          path: /lib/modules
