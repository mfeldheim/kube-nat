image:
  repository: ghcr.io/mfeldheim/kube-nat
  tag: latest
  pullPolicy: IfNotPresent

namespace: kube-nat

agent:
  irsaRoleArn: ""          # set to your IRSA IAM role ARN
  mode: auto               # "auto" or "manual"
  conntrackMax: ""         # override nf_conntrack_max (empty = kernel default)
  tagPrefix: kube-nat
  nodeSelector:
    node-role.kubernetes.io/nat: "true"
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

dashboard:
  replicas: 1
  scrapeInterval: 5s
  port: 8080
  resources:
    requests:
      cpu: 20m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 128Mi

serviceMonitor:
  enabled: false           # set true if Prometheus Operator is installed
  interval: 30s
