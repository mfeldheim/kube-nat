---
apiVersion: v1
kind: Service
metadata:
  name: kube-nat-agent
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "kube-nat.labels" . | nindent 4 }}
    app: kube-nat
    component: agent
spec:
  selector:
    app: kube-nat
    component: agent
  clusterIP: None
  ports:
  - name: metrics
    port: 9100
    targetPort: 9100
---
apiVersion: v1
kind: Service
metadata:
  name: kube-nat-dashboard
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "kube-nat.labels" . | nindent 4 }}
    app: kube-nat
    component: dashboard
spec:
  selector:
    app: kube-nat
    component: dashboard
  type: ClusterIP
  ports:
  - name: http
    port: {{ .Values.dashboard.port }}
    targetPort: {{ .Values.dashboard.port }}
